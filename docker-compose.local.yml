# Local development: Caddy HTTP-only reverse proxy (no SSL, no domain needed)
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: open333crm-caddy
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
