name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --filter=!@open333crm/web --filter=!@open333crm/widget

      - name: Build
        run: pnpm build --filter=!@open333crm/web --filter=!@open333crm/widget

      - name: Test
        run: pnpm test --filter=!@open333crm/web --filter=!@open333crm/widget