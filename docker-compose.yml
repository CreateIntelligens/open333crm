version: '3.9'

services:
  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on: [api, web]

  web:
    # Build will be defined later
    image: node:20-alpine
    restart: always

  api:
    # Build will be defined later
    image: node:20-alpine
    restart: always
    env_file: .env
    volumes:
      - ./workspace:/workspace
    depends_on: [postgres, redis, minio]

  postgres:
    image: pgvector/pgvector:16-pg16
    environment:
      POSTGRES_DB: open333crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports: ["9000:9000", "9001:9001"]

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
